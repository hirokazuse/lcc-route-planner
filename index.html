<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LCC ルートプランナー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-info: #e6f1fb;
      --bg-success: #eaf3de;
      --bg-warning: #faeeda;
      --bg-danger: #fcebeb;
      --text: #1a1a1a;
      --text-secondary: #666660;
      --text-info: #185fa5;
      --text-success: #3b6d11;
      --text-warning: #854f0b;
      --text-danger: #a32d2d;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, 'Helvetica Neue', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #2a2a28;
        --bg-info: #0c447c;
        --bg-success: #27500a;
        --bg-warning: #633806;
        --bg-danger: #791f1f;
        --text: #f0ede8;
        --text-secondary: #999890;
        --text-info: #85b7eb;
        --text-success: #c0dd97;
        --text-warning: #fac775;
        --text-danger: #f09595;
        --border: rgba(255,255,255,0.1);
        --border-md: rgba(255,255,255,0.2);
      }
    }
    body {
      font-family: var(--font);
      background: var(--bg-secondary);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .container { max-width: 680px; margin: 0 auto; }
    h1 {
      font-size: 22px; font-weight: 500;
      margin-bottom: 1.5rem;
      color: var(--text);
    }
    h1 span { color: var(--text-secondary); font-weight: 400; font-size: 16px; margin-left: 8px; }
    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 13px; color: var(--text-secondary); }
    input, select {
      height: 38px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md);
      background: var(--bg);
      color: var(--text);
      padding: 0 10px;
      font-size: 14px;
      font-family: var(--font);
      appearance: none;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--text-secondary);
    }
    .btn {
      height: 40px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md);
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      cursor: pointer;
      padding: 0 16px;
      transition: background 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: var(--bg-secondary); }
    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border-color: transparent;
      width: 100%;
      justify-content: center;
      margin-top: 6px;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-sm { height: 30px; font-size: 12px; padding: 0 10px; }
    .results { display: flex; flex-direction: column; gap: 12px; }
    .route-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
    }
    .route-card.featured { border: 2px solid var(--text-info); }
    .route-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 12px;
    }
    .route-title { font-size: 15px; font-weight: 500; }
    .badge {
      font-size: 11px; padding: 3px 10px;
      border-radius: var(--radius-md);
      white-space: nowrap;
    }
    .badge-info { background: var(--bg-info); color: var(--text-info); }
    .badge-success { background: var(--bg-success); color: var(--text-success); }
    .badge-warning { background: var(--bg-warning); color: var(--text-warning); }
    .route-path {
      display: flex; align-items: center;
      gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .city-chip {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 4px 10px; font-size: 13px; font-weight: 500;
    }
    .arrow { color: var(--text-secondary); font-size: 14px; }
    .route-meta {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 8px; margin-bottom: 12px;
    }
    .meta-item { text-align: center; }
    .meta-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
    .meta-value { font-size: 15px; font-weight: 500; }
    .meta-value.price { color: var(--text-success); }
    .detour-note {
      background: var(--bg-warning);
      border-radius: var(--radius-md);
      padding: 8px 12px; font-size: 13px;
      color: var(--text-warning); margin-bottom: 12px;
    }
    .legs { display: flex; flex-direction: column; gap: 0; }
    .leg-item {
      display: flex; align-items: center;
      justify-content: space-between;
      font-size: 13px; padding: 8px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .leg-item:last-child { border-bottom: none; }
    .leg-detail { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }
    .leg-links { display: flex; gap: 6px; flex-shrink: 0; }
    .loading {
      text-align: center; padding: 2rem;
      color: var(--text-secondary); font-size: 14px;
    }
    .error {
      background: var(--bg-danger); color: var(--text-danger);
      border-radius: var(--radius-md);
      padding: 12px 16px; font-size: 14px;
    }
    .section-label {
      font-size: 13px; color: var(--text-secondary);
      margin-bottom: 8px;
    }
    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .route-meta { grid-template-columns: repeat(3,1fr); }
      .leg-links { flex-direction: column; gap: 4px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>LCC ルートプランナー <span>寄り道も最適化</span></h1>

  <div class="card">
    <div class="form-grid">
      <div class="form-group">
        <label>出発地</label>
        <div style="display:flex;gap:6px;align-items:center;">
          <input type="text" id="origin" placeholder="例: 東京 / NRT" value="東京" style="flex:1;" />
          <button class="btn" style="flex-shrink:0;width:36px;height:38px;padding:0;font-size:16px;" onclick="swapCities()" title="入れ替え">⇄</button>
        </div>
      </div>
      <div class="form-group">
        <label>最終目的地</label>
        <input type="text" id="dest" placeholder="例: バリ島 / DPS" />
      </div>
      <div class="form-group">
        <label>出発日</label>
        <input type="date" id="depdate" />
      </div>
      <div class="form-group">
        <label>予算の目安（円）</label>
        <input type="number" id="budget" placeholder="例: 80000" value="80000" />
      </div>
      <div class="form-group full">
        <label>希望するトランジット都市（任意）</label>
        <input type="text" id="transit" placeholder="例: バンコク、クアラルンプール" />
      </div>
      <div class="form-group full">
        <label>旅行スタイル</label>
        <select id="style">
          <option value="balance">バランス重視（コスト＋時間）</option>
          <option value="detour">寄り道・乗継を楽しむ</option>
          <option value="cheapest">とにかく安く</option>
          <option value="fastest">なるべく速く</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" id="searchBtn" onclick="searchRoutes()">ルートを探す →</button>
  </div>

  <div id="results"></div>
</div>

<script>
function swapCities() {
  const o = document.getElementById('origin');
  const d = document.getElementById('dest');
  const tmp = o.value;
  o.value = d.value;
  d.value = tmp;
}

const today = new Date();
document.getElementById('depdate').value =
  `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

const iataMap = {
  '東京':'NRT','成田':'NRT','羽田':'HND',
  'バンコク':'BKK','ドンムアン':'DMK',
  'クアラルンプール':'KUL','KL':'KUL',
  'シンガポール':'SIN','バリ島':'DPS','デンパサール':'DPS',
  'ホーチミン':'SGN','ハノイ':'HAN',
  'ジャカルタ':'CGK','マニラ':'MNL','セブ':'CEB',
  'ソウル':'ICN','釜山':'PUS','台北':'TPE','香港':'HKG',
  'パリ':'CDG','ロンドン':'LHR','バルセロナ':'BCN',
  'ドバイ':'DXB','シドニー':'SYD','メルボルン':'MEL',
  '大阪':'KIX','名古屋':'NGO','福岡':'FUK','札幌':'CTS',
};

function formatDateShort(dateStr) {
  return dateStr.replace(/-/g,'');
}

function buildSkyscannerUrl(fromIata, toIata, date) {
  return `https://www.skyscanner.jp/transport/flights/${fromIata}/${toIata}/${formatDateShort(date)}/`;
}

function buildKiwiUrl(fromIata, toIata, date) {
  return `https://www.kiwi.com/en/search/results/${fromIata}/${toIata}/${date}`;
}

async function searchRoutes() {
  const origin = document.getElementById('origin').value.trim();
  const dest = document.getElementById('dest').value.trim();
  const depdate = document.getElementById('depdate').value;
  const budget = document.getElementById('budget').value;
  const transit = document.getElementById('transit').value.trim();
  const style = document.getElementById('style').value;

  if (!origin || !dest || !depdate) {
    document.getElementById('results').innerHTML = '<div class="error">出発地・目的地・日付を入力してください</div>';
    return;
  }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = '検索中...';
  document.getElementById('results').innerHTML = '<div class="loading">LCCルートを生成中...</div>';

  const styleMap = {
    balance: 'コストと所要時間のバランスを重視',
    detour: '寄り道・乗継観光を最大限楽しむことを優先',
    cheapest: 'とにかく最安値を優先',
    fastest: 'なるべく総移動時間を短く'
  };

  const prompt = `あなたはLCC（格安航空会社）を組み合わせた旅行ルート提案の専門家です。

以下の条件でLCCを乗り継いだルート候補を3〜4つ提案してください。

【条件】
- 出発地: ${origin}
- 最終目的地: ${dest}
- 出発日: ${depdate}
- 予算目安: ${budget ? budget + '円' : '指定なし'}
- 希望トランジット都市: ${transit || 'なし（自由に提案）'}
- スタイル: ${styleMap[style]}

【出力形式】必ずこのJSON形式のみで返答してください（他のテキスト不要）:
{
  "routes": [
    {
      "title": "ルート名",
      "featured": true,
      "badge": "おすすめ",
      "badge_type": "info",
      "detour_note": "寄り道のポイント（1〜2文）",
      "legs": [
        {
          "from": "出発地名",
          "to": "到着地名",
          "from_iata": "NRT",
          "to_iata": "BKK",
          "airline": "エアアジアX",
          "est_price": 25000,
          "duration": "7h"
        }
      ],
      "total_est": 55000,
      "total_hours": "約20時間",
      "detour_score": "★★★★☆"
    }
  ]
}

注意: 実際に存在するLCC路線を使うこと。est_priceは円建て推定値（片道）。featuredはおすすめ1件のみtrue。`;

  try {
    const res = await fetch('/api/route', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    renderRoutes(parsed.routes, depdate);
  } catch(e) {
    document.getElementById('results').innerHTML = `<div class="error">ルート生成に失敗しました: ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = 'ルートを探す →';
}

function renderRoutes(routes, depdate) {
  const el = document.getElementById('results');
  if (!routes || !routes.length) {
    el.innerHTML = '<div class="error">ルートが見つかりませんでした</div>';
    return;
  }

  let html = `<p class="section-label">${routes.length}件のルート候補</p><div class="results">`;

  routes.forEach(r => {
    const cities = [];
    if (r.legs && r.legs.length) {
      cities.push(r.legs[0].from);
      r.legs.forEach(l => cities.push(l.to));
    }

    const pathHtml = cities.map((c,i) =>
      `<span class="city-chip">${c}</span>${i < cities.length-1 ? '<span class="arrow">→</span>' : ''}`
    ).join('');

    const legsHtml = (r.legs||[]).map(leg => {
      const fromCode = leg.from_iata||leg.from.slice(0,3).toUpperCase();
      const toCode = leg.to_iata||leg.to.slice(0,3).toUpperCase();
      const ss = buildSkyscannerUrl(fromCode, toCode, depdate);
      const kw = buildKiwiUrl(fromCode, toCode, depdate);
      return `
        <div class="leg-item">
          <div>
            <div>${leg.from} → ${leg.to}</div>
            <div class="leg-detail">${leg.airline} · ${leg.duration} · 推定 ¥${(leg.est_price||0).toLocaleString()}</div>
          </div>
          <div class="leg-links">
            <a href="${ss}" target="_blank" rel="noopener"><button class="btn btn-sm">Skyscanner</button></a>
            <a href="${kw}" target="_blank" rel="noopener"><button class="btn btn-sm">Kiwi</button></a>
          </div>
        </div>`;
    }).join('');

    html += `
      <div class="route-card${r.featured ? ' featured' : ''}">
        <div class="route-header">
          <div class="route-title">${r.title}</div>
          <span class="badge badge-${r.badge_type||'info'}">${r.badge||''}</span>
        </div>
        <div class="route-path">${pathHtml}</div>
        <div class="route-meta">
          <div class="meta-item">
            <div class="meta-label">推定総額</div>
            <div class="meta-value price">¥${(r.total_est||0).toLocaleString()}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">総所要時間</div>
            <div class="meta-value">${r.total_hours||'-'}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">寄り道度</div>
            <div class="meta-value">${r.detour_score||'-'}</div>
          </div>
        </div>
        ${r.detour_note ? `<div class="detour-note">${r.detour_note}</div>` : ''}
        <div class="legs">${legsHtml}</div>
      </div>`;
  });

  html += '</div>';
  el.innerHTML = html;
}
</script>
</body>
</html>
