<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LCC Route Planner</title>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg-secondary: #f5f5f3;
      --bg-info: #e6f1fb; --bg-success: #eaf3de;
      --bg-warning: #faeeda; --bg-danger: #fcebeb;
      --text: #1a1a1a; --text-secondary: #666660;
      --text-info: #185fa5; --text-success: #3b6d11;
      --text-warning: #854f0b; --text-danger: #a32d2d;
      --border: rgba(0,0,0,0.12); --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px; --radius-lg: 12px;
      --font: -apple-system, 'Helvetica Neue', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c; --bg-secondary: #2a2a28;
        --bg-info: #0c447c; --bg-success: #27500a;
        --bg-warning: #633806; --bg-danger: #791f1f;
        --text: #f0ede8; --text-secondary: #999890;
        --text-info: #85b7eb; --text-success: #c0dd97;
        --text-warning: #fac775; --text-danger: #f09595;
        --border: rgba(255,255,255,0.1); --border-md: rgba(255,255,255,0.2);
      }
    }
    body { font-family: var(--font); background: var(--bg-secondary); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 680px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    h1 { font-size: 22px; font-weight: 500; }
    h1 span { color: var(--text-secondary); font-weight: 400; font-size: 16px; margin-left: 8px; }
    .lang-switcher { display: flex; gap: 4px; }
    .lang-btn {
      height: 30px; padding: 0 10px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md); background: transparent;
      color: var(--text-secondary); font-size: 12px; cursor: pointer;
      font-family: var(--font); transition: all 0.15s;
    }
    .lang-btn.active { background: var(--text); color: var(--bg); border-color: transparent; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 13px; color: var(--text-secondary); }
    input, select {
      height: 38px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md); background: var(--bg);
      color: var(--text); padding: 0 10px; font-size: 14px;
      font-family: var(--font); appearance: none;
    }
    input:focus, select:focus { outline: none; border-color: var(--text-secondary); }
    .btn {
      height: 40px; border-radius: var(--radius-md);
      border: 0.5px solid var(--border-md); background: transparent;
      color: var(--text); font-size: 14px; font-family: var(--font);
      cursor: pointer; padding: 0 16px; transition: background 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:hover { background: var(--bg-secondary); }
    .btn-primary { background: var(--text); color: var(--bg); border-color: transparent; width: 100%; justify-content: center; margin-top: 6px; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-sm { height: 30px; font-size: 12px; padding: 0 10px; }
    .results { display: flex; flex-direction: column; gap: 12px; }
    .route-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; }
    .route-card.featured { border: 2px solid var(--text-info); }
    .route-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
    .route-title { font-size: 15px; font-weight: 500; }
    .badge { font-size: 11px; padding: 3px 10px; border-radius: var(--radius-md); white-space: nowrap; }
    .badge-info { background: var(--bg-info); color: var(--text-info); }
    .badge-success { background: var(--bg-success); color: var(--text-success); }
    .badge-warning { background: var(--bg-warning); color: var(--text-warning); }
    .route-path { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .city-chip { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 4px 10px; font-size: 13px; font-weight: 500; }
    .arrow { color: var(--text-secondary); font-size: 14px; }
    .route-meta { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 12px; }
    .meta-item { text-align: center; }
    .meta-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
    .meta-value { font-size: 15px; font-weight: 500; }
    .meta-value.price { color: var(--text-success); }
    .detour-note { background: var(--bg-warning); border-radius: var(--radius-md); padding: 8px 12px; font-size: 13px; color: var(--text-warning); margin-bottom: 12px; }
    .legs { display: flex; flex-direction: column; }
    .leg-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
    .leg-item:last-child { border-bottom: none; }
    .leg-detail { color: var(--text-secondary); font-size: 12px; margin-top: 2px; }
    .leg-links { display: flex; gap: 6px; flex-shrink: 0; }
    .loading { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 14px; }
    .error { background: var(--bg-danger); color: var(--text-danger); border-radius: var(--radius-md); padding: 12px 16px; font-size: 14px; }
    .section-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .leg-links { flex-direction: column; gap: 4px; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 id="appTitle">LCC ルートプランナー <span id="appSubtitle">寄り道も最適化</span></h1>
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('ja')">日本語</button>
      <button class="lang-btn" onclick="setLang('en')">English</button>
      <button class="lang-btn" onclick="setLang('th')">ไทย</button>
    </div>
  </div>

  <div class="card">
    <div class="form-grid">
      <div class="form-group">
        <label id="lOrigin">出発地</label>
        <div style="display:flex;gap:6px;align-items:center;">
          <input type="text" id="origin" style="flex:1;" />
          <button class="btn" style="flex-shrink:0;width:36px;height:38px;padding:0;font-size:16px;" onclick="swapCities()" title="swap">⇄</button>
        </div>
      </div>
      <div class="form-group">
        <label id="lDest">最終目的地</label>
        <input type="text" id="dest" oninput="onDestInput()" />
        <span id="destHint" style="font-size:11px;color:var(--text-secondary);display:none;" id="destHint"></span>
      </div>
      <div class="form-group">
        <label id="lDate">出発日</label>
        <input type="date" id="depdate" />
      </div>
      <div class="form-group">
        <label id="lBudget">予算の目安（円）</label>
        <input type="number" id="budget" value="80000" />
      </div>
      <div class="form-group full">
        <label id="lTransit">希望するトランジット都市（任意）</label>
        <input type="text" id="transit" />
      </div>
      <div class="form-group">
        <label id="lLayover">乗り継ぎ滞在時間</label>
        <select id="layover">
          <option value="any" id="oLayAny">指定なし</option>
          <option value="short" id="oLayShort">短め（2時間〜・空港内）</option>
          <option value="half" id="oLayHalf">半日（6〜12時間・市内観光可）</option>
          <option value="overnight" id="oLayOver">1泊（24時間〜・ゆっくり観光）</option>
        </select>
      </div>
      <div class="form-group full">
        <label id="lStyle">旅行スタイル</label>
        <select id="style">
          <option value="balance" id="oBalance">バランス重視（コスト＋時間）</option>
          <option value="detour" id="oDetour">寄り道・乗継を楽しむ</option>
          <option value="cheapest" id="oCheapest">とにかく安く</option>
          <option value="fastest" id="oFastest">なるべく速く</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" id="searchBtn" onclick="searchRoutes()">ルートを探す →</button>
  </div>

  <div id="results"></div>
</div>

<script>

    layoverMap: { any:'乗り継ぎ時間は指定なし', short:'乗り継ぎは短め（2〜4時間、空港内のみ）', half:'半日程度の乗り継ぎ（6〜12時間、市内日帰り観光可能）', overnight:'1泊の乗り継ぎ（24時間以上、ゆっくり観光）' },

    oBalance: 'Balanced (cost + time)', oDetour: 'Enjoy layovers & detours',
    oCheapest: 'Cheapest', oFastest: 'Fastest',
    searchBtn: 'Find Routes →', searching: 'Searching...',
    loading: 'Generating LCC routes...', error: 'Please enter origin, destination and date',
    errorGen: 'Failed to generate routes', notFound: 'No routes found',
    routes: ' route(s) found', estTotal: 'Est. Total', totalTime: 'Total Time', detourScore: 'Detour Score',
    est: 'Est.',

    layover: 'Layover Duration',

    layoverMap: { any:'no preference on layover time', short:'short layover (2-4 hours, airport only)', half:'half-day layover (6-12 hours, city day trip possible)', overnight:'overnight layover (24+ hours, leisurely sightseeing)' },

    dest: 'ปลายทาง', destPh: 'เช่น บาหลี / DPS',

    oBalance: 'สมดุล (ราคา + เวลา)', oDetour: 'สนุกกับการแวะเที่ยว',

    styleMap: { balance:'สมดุลระหว่างราคาและเวลา', detour:'เพิ่มความสนุกในการแวะเที่ยวระหว่างทาง', cheapest:'ราคาถูกที่สุด', fastest:'ใช้เวลาน้อยที่สุด' },

    destPh2: 'เว้นว่างเพื่อรับการแนะนำแบบสุ่ม',
    omakaseMode: '🎲 โหมดสุ่ม: AI แนะนำเส้นทางที่คาดไม่ถึงภายในงบประมาณ',
    omakasePrompt: 'ไม่ระบุปลายทาง กรุณาแนะนำปลายทางที่น่าสนใจและคาดไม่ถึงซึ่งเดินทางได้ด้วย LCC จากต้นทางภายในงบประมาณ รวมถึงการท่องเที่ยวระหว่างแวะพักด้วย',
    promptLang: 'ภาษาไทย'
  }
};

let currentLang = 'ja';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach((b,i) => {
    b.classList.toggle('active', ['ja','en','th'][i] === lang);
  });
  const t = I18N[lang];
  document.getElementById('appTitle').innerHTML = `${t.title} <span id="appSubtitle">${t.subtitle}</span>`;
  document.getElementById('lOrigin').textContent = t.origin;
  document.getElementById('origin').placeholder = t.originPh;
  document.getElementById('lDest').textContent = t.dest;
  document.getElementById('dest').placeholder = t.destPh;
  document.getElementById('lDate').textContent = t.date;
  document.getElementById('lBudget').textContent = t.budget;
  document.getElementById('budget').placeholder = t.budgetPh;
  document.getElementById('lTransit').textContent = t.transit;
  document.getElementById('transit').placeholder = t.transitPh;
  document.getElementById('lStyle').textContent = t.style;
  document.getElementById('oBalance').textContent = t.oBalance;
  document.getElementById('oDetour').textContent = t.oDetour;
  document.getElementById('oCheapest').textContent = t.oCheapest;
  document.getElementById('oFastest').textContent = t.oFastest;
  document.getElementById('searchBtn').textContent = t.searchBtn;
  document.getElementById('dest').placeholder = document.getElementById('dest').value ? t.destPh : t.destPh2;
  document.getElementById('lLayover').textContent = t.layover;
  document.getElementById('oLayAny').textContent = t.oLayAny;
  document.getElementById('oLayShort').textContent = t.oLayShort;
  document.getElementById('oLayHalf').textContent = t.oLayHalf;
  document.getElementById('oLayOver').textContent = t.oLayOver;
  document.title = t.title;
}

function onDestInput() {
  const t = I18N[currentLang];
  const val = document.getElementById('dest').value.trim();
  const hint = document.getElementById('destHint');
  if (!val) {
    hint.textContent = t.omakaseMode;
    hint.style.display = 'block';
  } else {
    hint.style.display = 'none';
  }
}

function swapCities() {
  const o = document.getElementById('origin');
  const d = document.getElementById('dest');
  const tmp = o.value; o.value = d.value; d.value = tmp;
}

const today = new Date();
document.getElementById('depdate').value =
  `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

setLang('ja');
document.getElementById('dest').placeholder = I18N['ja'].destPh2;
document.getElementById('dest').addEventListener('focus', function() {
  if (!this.value) this.placeholder = '';
});
document.getElementById('dest').addEventListener('blur', function() {
  if (!this.value) this.placeholder = I18N[currentLang].destPh2;
});

function formatDateShort(d) { return d.replace(/-/g,''); }
function buildSkyscannerUrl(f, t, d) { return `https://www.skyscanner.jp/transport/flights/${f}/${t}/${formatDateShort(d)}/`; }
function buildKiwiUrl(f, t, d) {
  const [y,m,dd] = d.split('-');
  return `https://www.kiwi.com/en/search/results/${f}/${t}?adults=1&dateFrom=${dd}%2F${m}%2F${y}&dateTo=${dd}%2F${m}%2F${y}`;
}

async function searchRoutes() {
  const t = I18N[currentLang];
  const origin = document.getElementById('origin').value.trim();
  const dest = document.getElementById('dest').value.trim();
  const depdate = document.getElementById('depdate').value;
  const budget = document.getElementById('budget').value;
  const transit = document.getElementById('transit').value.trim();
  const style = document.getElementById('style').value;
  const layover = document.getElementById('layover').value;

  if (!origin || !depdate) {
    document.getElementById('results').innerHTML = `<div class="error">${t.error}</div>`;
    return;
  }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.textContent = t.searching;
  document.getElementById('results').innerHTML = `<div class="loading">${t.loading}</div>`;

  const isOmakase = !dest;
  const destLine = isOmakase ? t.omakasePrompt : `- Destination: ${dest}`;
  const prompt = `You are an expert in combining LCC (Low-Cost Carrier) flights for travel routes. Respond in ${t.promptLang}.

Suggest 3-4 LCC connecting route options for these conditions:
- Origin: ${origin}
- ${destLine}
- Date: ${depdate}
- Budget: ${budget ? budget + ' JPY' : 'flexible'}
- Preferred transit: ${transit || 'none (suggest freely)'}
- Style: ${t.styleMap[style]}
- Layover preference: ${t.layoverMap[layover]}

Reply ONLY in this JSON format (no other text):
{
  "routes": [
    {
      "title": "Route name",
      "featured": true,
      "badge": "Recommended",
      "badge_type": "info",
      "detour_note": "Detour highlight (1-2 sentences)",
      "legs": [
        { "from": "City name", "to": "City name", "from_iata": "NRT", "to_iata": "BKK", "airline": "AirAsia X", "est_price": 25000, "duration": "7h", "layover_hours": 8, "different_airline_next": true }
      ],
      "total_est": 55000,
      "total_hours": "~20h",
      "detour_score": "★★★★☆"
    }
  ]
}

Rules: Use real LCC routes. est_price in JPY (one-way). Only one featured:true.
layover_hours: hours at transit city (0 if last leg). different_airline_next: true if next leg is a different airline (interline risk).`;

  try {
    const res = await fetch('/api/route', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content.map(i => i.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    renderRoutes(parsed.routes, depdate);
  } catch(e) {
    document.getElementById('results').innerHTML = `<div class="error">${t.errorGen}: ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.textContent = t.searchBtn;
}

function renderRoutes(routes, depdate) {
  const t = I18N[currentLang];
  const el = document.getElementById('results');
  if (!routes || !routes.length) { el.innerHTML = `<div class="error">${t.notFound}</div>`; return; }

  let html = `<p class="section-label">${routes.length}${t.routes}</p><div class="results">`;

  routes.forEach(r => {
    const cities = [];
    if (r.legs && r.legs.length) { cities.push(r.legs[0].from); r.legs.forEach(l => cities.push(l.to)); }
    const pathHtml = cities.map((c,i) =>
      `<span class="city-chip">${c}</span>${i < cities.length-1 ? '<span class="arrow">→</span>' : ''}`
    ).join('');

    const legsHtml = (r.legs||[]).map(leg => {
      const fc = leg.from_iata||leg.from.slice(0,3).toUpperCase();
      const tc = leg.to_iata||leg.to.slice(0,3).toUpperCase();
      const layoverHtml = leg.layover_hours > 0
        ? `<div class="leg-detail" style="color:var(--text-info)">✈ ${t.layoverLabel}: ${leg.layover_hours}h${leg.different_airline_next ? ' ⚠️' : ''}</div>`
        : '';
      return `
        <div class="leg-item">
          <div>
            <div>${leg.from} → ${leg.to}</div>
            <div class="leg-detail">${leg.airline} · ${leg.duration} · ${t.est} ¥${(leg.est_price||0).toLocaleString()}</div>
            ${layoverHtml}
          </div>
          <div class="leg-links">
            <a href="${buildSkyscannerUrl(fc,tc,depdate)}" target="_blank" rel="noopener"><button class="btn btn-sm">Skyscanner</button></a>
            <a href="${buildKiwiUrl(fc,tc,depdate)}" target="_blank" rel="noopener"><button class="btn btn-sm">Kiwi</button></a>
          </div>
        </div>`;
    }).join('');

    html += `
      <div class="route-card${r.featured?' featured':''}">
        <div class="route-header">
          <div class="route-title">${r.title}</div>
          <span class="badge badge-${r.badge_type||'info'}">${r.badge||''}</span>
        </div>
        <div class="route-path">${pathHtml}</div>
        <div class="route-meta">
          <div class="meta-item"><div class="meta-label">${t.estTotal}</div><div class="meta-value price">¥${(r.total_est||0).toLocaleString()}</div></div>
          <div class="meta-item"><div class="meta-label">${t.totalTime}</div><div class="meta-value">${r.total_hours||'-'}</div></div>
          <div class="meta-item"><div class="meta-label">${t.detourScore}</div><div class="meta-value">${r.detour_score||'-'}</div></div>
        </div>
        ${r.detour_note?`<div class="detour-note">${r.detour_note}</div>`:''}
        ${(r.legs||[]).some(l=>l.different_airline_next)?`<div class="error" style="font-size:12px;margin-bottom:8px;">${t.layoverWarn}</div>`:''}
        <div class="legs">${legsHtml}</div>
      </div>`;
  });

  html += '</div>';
  el.innerHTML = html;
}
</script>
</body>
</html>
